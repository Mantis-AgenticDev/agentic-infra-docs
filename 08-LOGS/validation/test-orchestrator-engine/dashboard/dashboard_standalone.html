        .search-bar input:focus { outline: 1px solid var(--text-gold); }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; padding: 20px; }
        .kpi-card { background-color: var(--bg-card); padding: 15px; border-radius: 6px; border: 1px solid var(--border-color); }
        .kpi-title { font-size: 0.8rem; color: #888; margin-bottom: 5px; }
        .kpi-value { font-size: 1.5rem; font-weight: bold; }
        .highlight-green { color: var(--text-green); }
        .highlight-red { color: var(--text-red); }

        .table-container { flex: 1; overflow-y: auto; padding: 0 20px 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { background-color: var(--bg-card); position: sticky; top: 0; z-index: 10; font-weight: normal; color: #888; }
        tr:hover { background-color: var(--bg-hover); }
        .status-icon { font-size: 1.2rem; cursor: pointer; }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); }
        .modal-content { background-color: var(--bg-card); margin: 10% auto; border: 1px solid var(--border-color); width: 60%; border-radius: 8px; overflow: hidden; }
        .modal-header { padding: 15px 20px; background-color: var(--bg-sidebar); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .modal-header h3 { color: var(--text-gold); }
        .close-btn { color: #aaa; font-size: 28px; font-weight: bold; cursor: pointer; }
        .close-btn:hover { color: #fff; }
        .modal-body { padding: 20px; max-height: 60vh; overflow-y: auto; }
        .issue-block { background: var(--bg-color); border-left: 4px solid var(--text-red); padding: 15px; margin-bottom: 15px; }

    function renderTable() {

            if (currentFilter.status !== null && a.passed !== currentFilter.status) return false;
            if (currentFilter.domain !== null && a.domain !== currentFilter.domain) return false;
            if (currentFilter.search) return a.file.toLowerCase().includes(currentFilter.search.toLowerCase());
            return true;
        });
        filtered.slice(0, 100).forEach((a) => {

                <td><span class="status-icon" style="cursor:${a.issues && a.issues.length ? 'pointer' : 'default'}" onclick="${a.issues && a.issues.length ? `openModal(${manifestData.artifacts.indexOf(a)})` : ''}">${a.passed ? '✅' : '❌'}</span></td>

            `;
            tbody.appendChild(tr);
        });

        if (element) element.classList.add('active');
        if (type === 'global') currentFilter = { status: null, domain: null, search: document.getElementById('search-input').value };
        else if (type === 'domain') { currentFilter.domain = value; currentFilter.status = null; }
        else if (type === 'status') { currentFilter.status = value; currentFilter.domain = null; }
        renderTable();
    }

    function setupEventListeners() {
        document.getElementById('nav-global').onclick = (e) => setFilter('global', null, e.target);
        document.getElementById('nav-passed').onclick = (e) => setFilter('status', true, e.target);
        document.getElementById('nav-failed').onclick = (e) => setFilter('status', false, e.target);
        document.getElementById('search-input').addEventListener('input', (e) => { currentFilter.search = e.target.value; renderTable(); });
        document.getElementById('modal-close').onclick = () => document.getElementById('issue-modal').style.display = "none";
        window.onclick = (e) => { if (e.target == document.getElementById('issue-modal')) document.getElementById('issue-modal').style.display = "none"; };
    }

    window.openModal = function(index) {
        const artifact = manifestData.artifacts[index];
        document.getElementById('modal-title').innerText = `Issues in: ${artifact.file.split('/').pop()}`;
        const body = document.getElementById('modal-body');
        body.innerHTML = '';
        if (artifact.issues && artifact.issues.length > 0) {
            artifact.issues.forEach(issue => {
                let hint = "Revisar logs y normativas MANTIS C1-C8/V1-V3.";
                Object.keys(FIX_HINTS).forEach(key => { if ((issue.category && issue.category.includes(key)) || (issue.description && issue.description.includes(key))) hint = FIX_HINTS[key]; });
                body.innerHTML += `
                    <div class="issue-block ${issue.severity === 'WARNING' ? 'warning' : ''}">
                        <div class="issue-title">[${issue.severity || 'ERROR'}] ${issue.category || issue.constraint} - Valiator: ${issue.validator || 'unknown'}</div>
                        <div>${issue.description || ''} (Línea ${issue.line || '?'})</div>
                        ${issue.snippet ? `<div class="issue-snippet">${issue.snippet.replace(/</g, "&lt;")}</div>` : ''}
                        <div class="fix-hint">💡 Hint: ${hint}</div>
                    </div>
                `;
            });
        } else {
            body.innerHTML = '<p>No se reportaron issues estructurados. Revisa stderr logs.</p>';
        }
        document.getElementById('issue-modal').style.display = "block";
    };
</script>
</body>
</html>
