name: "CodeQL Analysis"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 3 * * 1'  # Weekly on Monday at 03:00 UTC

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'python', 'javascript', 'go' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        queries: security-and-quality

    - name: Autobuild (Python)
      if: matrix.language == 'python'
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Autobuild (JavaScript)
      if: matrix.language == 'javascript'
      run: |
        if [ -f package.json ]; then npm ci; fi

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{matrix.language}}"
        upload: true

    # Custom step: Run MANTIS constraint validators
    - name: Run MANTIS constraint validators
      if: matrix.language == 'python' || matrix.language == 'javascript'
      run: |
        bash 05-CONFIGURATIONS/validation/audit-secrets.sh
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          git diff --name-only ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} -- '*.md' '*.py' '*.js' | \
          while read file; do
            [[ -f "$file" ]] && bash 05-CONFIGURATIONS/validation/verify-constraints.sh --file "$file" --json || exit 1
          done
        fi
