name: "CodeQL Analysis - Report Only"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 0 * * 1"  # Weekly on Monday at 00:00 UTC

permissions:
  actions: read
  contents: read
  security-events: write  # Only for uploading SARIF reports, NOT for modifying code

jobs:
  analyze:
    name: Analyze (Report Only)
    runs-on: ubuntu-latest
    if: github.repository == 'Mantis-AgenticDev/agentic-infra-docs'

    strategy:
      fail-fast: false
      matrix:
        language: ["python", "javascript"]  # Only languages with actual source code

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild (Python)
        if: matrix.language == 'python'
        run: |
          if [ -f requirements.txt ]; then
            python -m pip install --upgrade pip
            pip install -r requirements.txt || true
          fi

      - name: Autobuild (JavaScript)
        if: matrix.language == 'javascript'
        run: |
          if [ -f package.json ]; then
            npm ci --ignore-scripts || true
          fi

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          upload: true

      # ✅ ALWAYS PASS: This job never fails the workflow (report-only mode)
      - name: Ensure workflow always passes (report-only)
        if: always()
        run: exit 0
