---
artifact_id: integrity-check-workflow
artifact_type: ci_cd_workflow
version: 2.0.0-COMPREHENSIVE
constraints_mapped: ["C1","C4","C5","C8"]
canonical_path: .github/workflows/integrity-check.yml
domain: 05-CONFIGURATIONS
subdomain: pipelines
agent_role: pipelines-master
language_lock: es-ES
validation_command: orchestrator-engine.sh --domain configurations --strict
tier: 1
immutable: true
requires_human_approval_for_changes: true
audience: ["agentic_assistants"]
human_readable: false
checksum_sha256: "66d9a6dd43a731622a287e3896bba143bf826e619f57290b1ff1f92402145121"
---
# WORKFLOW: INTEGRITY CHECK & MANTIS NORMS VALIDATION
# Propósito: Validación automatizada de constraints (C1-C8) en cada push/PR.
# Generado por: pipelines-master-agent
# Fecha: 2026-04-30
# Alcance: Scripts, Terraform, Docker Compose, YAML configs, Checksums.

name: 🔍 Integrity Check & Validation (MANTIS C1-C8)

on:
  push:
    branches: ["main", "develop", "release/*"]
    paths:
      - "05-CONFIGURATIONS/**"
      - ".github/workflows/**"
  pull_request:
    branches: ["main"]
    paths:
      - "05-CONFIGURATIONS/**"

permissions:
  contents: read
  checks: write # Para reportar status en PR

jobs:
  # --- JOB 1: VALIDACIÓN DE SCRIPTS (C5, C8) ---
  validate-scripts:
    name: 📜 Validate Bash Scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Syntax Check (bash -n)
        run: |
          echo "🔍 Checking syntax for all scripts..."
          find 05-CONFIGURATIONS/scripts -name "*.sh" -exec bash -n {} \;
          echo "✅ Syntax OK"

      - name: ShellCheck Analysis
        run: |
          echo "🔍 Running ShellCheck (strict mode)..."
          find 05-CONFIGURATIONS/scripts -name "*.sh" -exec shellcheck -e SC1090,SC2034,SC2154 {} \;
          echo "✅ ShellCheck OK"

      - name: Frontmatter Validation
        run: |
          echo "🔍 Verifying mandatory frontmatter in scripts..."
          for f in $(find 05-CONFIGURATIONS/scripts -name "*.sh"); do
            grep -q "^# checksum_sha256: "66d9a6dd43a731622a287e3896bba143bf826e619f57290b1ff1f92402145121"
            grep -q "^checksum_sha256:" "$f" || \
            (echo "❌ FAIL: $f missing checksum in frontmatter" && exit 1)
          done
          echo "✅ Frontmatter structure OK"

  # --- JOB 2: VALIDACIÓN DE TERRAFORM (C2, C3, C5) ---
  validate-terraform:
    name: 🏗️ Validate Terraform Modules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Terraform Format Check (C2)
        id: fmt
        run: terraform fmt -check -recursive 05-CONFIGURATIONS/terraform/
        continue-on-error: false

      - name: Terraform Init & Validate (C5)
        id: validate
        run: |
          cd 05-CONFIGURATIONS/terraform/
          terraform init -backend=false -input=false
          terraform validate
        continue-on-error: false

      - name: Checkov Security Scan (C3)
        id: checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: 05-CONFIGURATIONS/terraform/
          framework: terraform
          soft_fail: false
          output_format: cli
          compact: true
          quiet: true

  # --- JOB 3: VALIDACIÓN DE YAML & CONFIGS (C1, C4, C5) ---
  validate-configs:
    name: ⚙️ Validate YAML & JSON Configs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq

      - name: YAML Syntax Check
        run: |
          echo "🔍 Checking YAML syntax in configurations..."
          find 05-CONFIGURATIONS -name "*.yaml" -o -name "*.yml" | xargs -I {} yq eval '.' {} > /dev/null || exit 1
          echo "✅ YAML Syntax OK"

      - name: JSON Validation
        run: |
          echo "🔍 Checking JSON validity..."
          find . -name "*.json" -path "./05-CONFIGURATIONS/*" -exec jq empty {} \;
          echo "✅ JSON Validity OK"

  # --- JOB 4: CHECKSUM INTEGRITY & REGISTRY SYNC (C4, C1) ---
  verify-checksums:
    name: 🔐 Verify SHA256 Integrity
    needs: [validate-scripts, validate-terraform, validate-configs]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Checksum Consistency
        run: |
          echo "🔍 Verifying SHA256 checksums match registry (if present)..."
          MANIFEST="05-CONFIGURATIONS/registry/checksum-manifest.json"
          
          if [[ -f "$MANIFEST" ]]; then
            echo "📄 Manifest found. Validating entries..."
            jq -r '.artifacts | to_entries[] | select(.value.sha256 != "PENDING_GENERATION") | "\(.key) \(.value.sha256)"' "$MANIFEST" | \
            while read -r filepath expected_hash; do
              if [[ -f "$filepath" ]]; then
                actual_hash=$(sha256sum "$filepath" | awk '{print $1}')
                if [[ "$expected_hash" == "$actual_hash" ]]; then
                  echo "✅ $filepath: OK"
                else
                  echo "❌ MISMATCH: $filepath (Expected: $expected_hash, Got: $actual_hash)"
                  exit 1
                fi
              else
                echo "⚠️ FILE_NOT_FOUND: $filepath (Skipping)"
              fi
            done
          else
            echo "ℹ️ No checksum-manifest.json found. Skipping checksum verification."
          fi
          echo "✅ Integrity check passed"

  # --- JOB 5: ORCHESTRATOR SIMULATION (C5, C8) ---
  orchestrator-check:
    name: 🤖 Orchestrator Engine Simulation
    needs: [verify-checksums]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Orchestrator Engine (Strict Mode)
        run: |
          echo "🚀 Executing orchestrator-engine.sh --domain configurations --strict"
          if [[ -f "05-CONFIGURATIONS/validation/orchestrator-engine.sh" ]]; then
            bash 05-CONFIGURATIONS/validation/orchestrator-engine.sh --domain configurations --strict --ci-mode
          else
            echo "⚠️ orchestrator-engine.sh not found. Running fallback checks..."
            # Fallback: Ensure key files exist and are valid
            test -f "05-CONFIGURATIONS/configurations-master-agent.md" && echo "✅ Master Agent OK"
            test -f "05-CONFIGURATIONS/interface-spec.yaml" && echo "✅ Interface Spec OK"
          fi
          echo "✅ Orchestrator simulation completed"

      - name: Upload Validation Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: |
            05-CONFIGURATIONS/.tmp/
            08-LOGS/
          retention-days: 30


---
