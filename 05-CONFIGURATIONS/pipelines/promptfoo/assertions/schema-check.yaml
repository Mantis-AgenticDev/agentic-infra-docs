---
title: "Promptfoo Assertions - Schema & Structured Logging Validation"
version: "1.0.0"
constraints_mapped: ["C4", "C8", "C5"]
validation_command: "npx promptfoo@latest eval --config 05-CONFIGURATIONS/pipelines/promptfoo/config.yaml --assertions 05-CONFIGURATIONS/pipelines/promptfoo/assertions/schema-check.yaml --no-progress-bar"
---
# Reusable assertions for verifying response schemas and structured logging (C8)
# Ensures tenant_id is present in outputs and logs follow JSON format with trace_id.

description: "Schema validation for RAG responses, error envelopes, and log entries"

assertions:
  # --- Schema: Standard API Response Envelope ---
  - id: standard-response-envelope
    type: javascript
    value: |
      // Expected response structure:
      // { "status": "success|error", "data": {}, "meta": { "tenant_id": "...", "trace_id": "..." } }
      if (!output || typeof output !== 'object') {
        throw new Error("Response must be a JSON object");
      }
      if (!output.status) {
        throw new Error("Missing 'status' field in response envelope");
      }
      if (!output.meta || !output.meta.tenant_id) {
        throw new Error("C4 violation: 'meta.tenant_id' missing in response");
      }
      if (!output.meta.trace_id) {
        throw new Error("C8 violation: 'meta.trace_id' missing in structured response");
      }
      return true;

  # --- Schema: Error Response Format ---
  - id: error-response-schema
    type: javascript
    value: |
      // Expected error structure: { "status": "error", "error": { "code": "...", "message": "..." }, "meta": { "tenant_id": "...", "trace_id": "..." } }
      if (output.status === 'error') {
        if (!output.error || !output.error.code || !output.error.message) {
          throw new Error("Error response missing required fields (code, message)");
        }
        if (!output.meta || !output.meta.trace_id) {
          throw new Error("Error response must include trace_id for debugging");
        }
      }
      return true;

  # --- Schema: RAG Query Response ---
  - id: rag-response-schema
    type: javascript
    value: |
      // Expected RAG response: { "answer": "...", "sources": [{"id": "...", "tenant_id": "..."}], "meta": { ... } }
      if (output.answer === undefined) {
        throw new Error("RAG response missing 'answer' field");
      }
      if (output.sources && Array.isArray(output.sources)) {
        for (const src of output.sources) {
          if (src.tenant_id && src.tenant_id !== context.vars.tenant_id) {
            throw new Error(`C4 violation: source tenant_id '${src.tenant_id}' does not match request tenant '${context.vars.tenant_id}'`);
          }
        }
      }
      return true;

  # --- Schema: Log Entry Structure (C8) ---
  - id: structured-log-schema
    type: javascript
    value: |
      // Validates a sample log line (simulated) for required JSON fields
      const logLine = {
        level: "info",
        timestamp: new Date().toISOString(),
        tenant_id: context.vars.tenant_id,
        trace_id: "mock-trace-123",
        message: "Request processed",
        service: "agentic-api"
      };
      const requiredFields = ['level', 'timestamp', 'tenant_id', 'trace_id', 'message'];
      for (const field of requiredFields) {
        if (!logLine.hasOwnProperty(field)) {
          throw new Error(`C8 violation: Log missing field '${field}'`);
        }
      }
      if (typeof logLine.tenant_id !== 'string' || logLine.tenant_id.length < 10) {
        throw new Error("Invalid tenant_id in log");
      }
      return true;

  # --- Assertion: No Cross-Tenant Data Leak in Logs ---
  - id: log-tenant-isolation
    type: javascript
    value: |
      // Ensure logs do not accidentally contain another tenant's ID in clear text
      const logMessage = `User from tenant ${context.vars.tenant_id} accessed document`;
      if (logMessage.includes('tenant-beta')) {
        throw new Error("Log message contains cross-tenant reference");
      }
      return true;

  # --- Assertion: Frontmatter Validation Command Present (C5) ---
  - id: frontmatter-validation
    type: javascript
    value: |
      // Simulated check that the skill/document includes the exact validation command
      const skillContent = `
        ---
        title: "Example Skill"
        validation_command: "./05-CONFIGURATIONS/validation/validate-skill-integrity.sh --strict"
        ---
      `;
      const match = skillContent.match(/validation_command:\s*["']?([^"'\n]+)["']?/);
      if (!match) {
        throw new Error("C5 violation: Frontmatter missing validation_command");
      }
      return true;

# 🟢 VALIDATION: yq eval '.assertions | length' 05-CONFIGURATIONS/pipelines/promptfoo/assertions/schema-check.yaml
