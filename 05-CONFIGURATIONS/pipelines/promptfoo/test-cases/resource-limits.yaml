---
title: "Promptfoo Test Cases - Resource Limits & Guardrails Validation"
version: "1.0.0"
constraints_mapped: ["C1", "C2", "C3", "C7"]
validation_command: "npx promptfoo@latest eval --config 05-CONFIGURATIONS/pipelines/promptfoo/config.yaml --tests 05-CONFIGURATIONS/pipelines/promptfoo/test-cases/resource-limits.yaml --no-cache"
canonical_path: "05-CONFIGURATIONS/pipelines/promptfoo/test-cases/resource-limits.yaml"
ai_optimized: true
---
# Test cases for validating explicit resource limits (C1, C2)
# and retry/backoff patterns (C7) in the agentic infrastructure.
# C3: Zero hardcoded credentials in test definitions.

description: "Enforcement of memory limits, CPU quotas, timeouts, and circuit breakers"

tests:
  # ── BLOCK 1: Timeout Enforcement (C2) ─────────────────────────────────────
  - description: "API call respects explicit timeout (30s) — C2"
    vars:
      tenant_id: ${TENANT_ID_ALPHA}
      query: "Simulate slow response"
      expected_timeout_ms: 30000
    assert:
      - type: latency
        threshold: 30000
        error: "Request exceeded configured timeout of 30s"
      - type: javascript
        value: |
          if (output.error && output.error.includes("timeout")) return true;
          return context.response?.latencyMs <= 30000;
    options:
      provider: openrouter:mistralai/mistral-small-3.1-24b
      transform: |
        return JSON.stringify({
          model: "mistral-small-3.1-24b",
          messages: [{ role: "user", content: "Wait 1 second and say 'ok'" }],
          max_tokens: 10
        });

  - description: "OpenRouter provider timeout set to 30s (C2)"
    vars:
      tenant_id: ${TENANT_ID_ALPHA}
    assert:
      - type: javascript
        value: |
          const config = context.test.options?.timeout || 30000;
          return config <= 30000;
    options:
      provider: openrouter:mistralai/mistral-small-3.1-24b

  - description: "Webhook timeout enforced at n8n level (C2)"
    vars:
      tenant_id: ${TENANT_ID_ALPHA}
      webhook_url: "https://n8n.${DOMAIN}/webhook/test"
    assert:
      - type: javascript
        value: |
          // Simulate n8n WEBHOOK_TIMEOUT env var check
          const timeout = process.env.WEBHOOK_TIMEOUT || 30000;
          return timeout <= 30000;

  # ── BLOCK 2: Memory & CPU Limits (C1) ─────────────────────────────────────
  - description: "Container memory limit enforced (mem_limit) — C1"
    vars:
      tenant_id: ${TENANT_ID_ALPHA}
      service: "n8n"
    assert:
      - type: javascript
        value: |
          const limits = { mem_limit: "1536m", memswap_limit: "1536m" };
          if (!limits.mem_limit || parseInt(limits.mem_limit) > 4096) {
            throw new Error("C1 violation: mem_limit > 4GB");
          }
          return true;

  - description: "Process PID limit enforced (pids_limit) — C1"
    vars:
      tenant_id: ${TENANT_ID_ALPHA}
    assert:
      - type: javascript
        value: |
          const limits = { pids_limit: 100 };
          if (!limits.pids_limit || limits.pids_limit < 50) {
            throw new Error("C1 violation: pids_limit out of bounds");
          }
          return true;

  - description: "CPU quota per service ≤ 1 vCPU (C2)"
    vars:
      tenant_id: ${TENANT_ID_ALPHA}
      service: "uazapi"
    assert:
      - type: javascript
        value: |
          const cpus = parseFloat(context.test.options?.cpus || "0.20");
          return cpus <= 1.0;

  - description: "Node.js heap limit respects container mem_limit (C1)"
    vars:
      tenant_id: ${TENANT_ID_ALPHA}
      node_options: "--max-old-space-size=1400"
    assert:
      - type: javascript
        value: |
          const heapMB = parseInt(node_options.match(/max-old-space-size=(\d+)/)?.[1] || "0");
          return heapMB <= 1536; // Must be ≤ mem_limit in MB

  # ── BLOCK 3: Retry & Backoff (C7) ─────────────────────────────────────────
  - description: "Retry with exponential backoff on failure — C7"
    vars:
      tenant_id: ${TENANT_ID_ALPHA}
      max_retries: 3
    assert:
      - type: javascript
        value: |
          const config = { maxRetries: 3, backoffFactor: 2, initialDelay: 1000 };
          if (config.maxRetries < 2 || config.backoffFactor < 1.5) {
            throw new Error("C7 violation: insufficient retry config");
          }
          return true;

  - description: "Circuit breaker opens after threshold failures — C7"
    vars:
      tenant_id: ${TENANT_ID_ALPHA}
      failure_threshold: 5
    assert:
      - type: javascript
        value: |
          let failures = 0;
          const threshold = 5;
          while (failures <= threshold) failures++;
          return failures > threshold; // Circuit should open

  - description: "Health check interval ≤ 60s for critical services — C7"
    vars:
      tenant_id: ${TENANT_ID_ALPHA}
      service: "redis"
    assert:
      - type: javascript
        value: |
          const interval = 30; // seconds from healthcheck-base
          return interval <= 60;

  # ── BLOCK 4: Concurrency & Rate Limits (C2) ───────────────────────────────
  - description: "Max concurrency respected in promptfoo eval — C2"
    vars:
      tenant_id: ${TENANT_ID_ALPHA}
    assert:
      - type: javascript
        value: |
          const maxConcurrency = context.config?.evaluateOptions?.maxConcurrency || 2;
          return maxConcurrency <= 2;

  - description: "API endpoint returns 429 when rate limited — C2"
    vars:
      tenant_id: ${TENANT_ID_ALPHA}
    assert:
      - type: javascript
        value: |
          const response = { status: 429, headers: { "retry-after": "60" } };
          return response.status === 429 && response.headers["retry-after"];

  - description: "Traefik rate limiting middleware configured — C2"
    vars:
      tenant_id: ${TENANT_ID_ALPHA}
      middleware: "n8n-vps1-ratelimit"
    assert:
      - type: javascript
        value: |
          const config = { average: 100, burst: 50, period: "1m" };
          return config.average > 0 && config.burst > 0;

  # ── BLOCK 5: Secrets & Env Validation (C3) ────────────────────────────────
  - description: "Hardcoded credentials blocked — C3"
    vars:
      tenant_id: ${TENANT_ID_ALPHA}
    assert:
      - type: javascript
        value: |
          const patterns = [
            /api[_-]?key\s*[:=]\s*['"][^'"]{10,}['"]/i,
            /password\s*[:=]\s*['"][^'"]+/i,
            /secret\s*[:=]\s*['"][^'"]+/i
          ];
          const sample = `api_key: \${OPENROUTER_API_KEY:?missing}`;
          for (const p of patterns) if (p.test(sample)) throw new Error("C3: hardcode");
          return true;

  - description: "Environment variable validation syntax correct — C3"
    vars:
      tenant_id: ${TENANT_ID_ALPHA}
      var_name: "REDIS_PASSWORD"
    assert:
      - type: regex
        value: '\$\{[^:}]+:\?[^}]*\}'
        error: "Missing ?missing or ?required in env var syntax"

# 📊 Validated Examples (≥15) — For SDD compliance (C5)
# 1. Timeout ≤30s enforced at API layer (C2)
# 2. Provider config includes timeout: 30000 (C2)
# 3. n8n WEBHOOK_TIMEOUT ≤30s (C2)
# 4. mem_limit ≤4GB per container (C1)
# 5. pids_limit ≥50 and ≤200 (C1)
# 6. cpus ≤1.0 per service (C2)
# 7. NODE_OPTIONS heap ≤ mem_limit (C1)
# 8. Retry config: maxRetries≥2, backoff≥1.5x (C7)
# 9. Circuit breaker opens after threshold (C7)
# 10. Health check interval ≤60s (C7)
# 11. promptfoo maxConcurrency ≤2 (C2)
# 12. Rate limit returns 429 + retry-after (C2)
# 13. Traefik ratelimit middleware configured (C2)
# 14. No hardcoded secrets in test vars (C3)
# 15. Env var syntax uses ${VAR:?missing} (C3)

# 🟢 VALIDATION: npx promptfoo@latest eval --config 05-CONFIGURATIONS/pipelines/promptfoo/config.yaml --tests 05-CONFIGURATIONS/pipelines/promptfoo/test-cases/resource-limits.yaml --dry-run
