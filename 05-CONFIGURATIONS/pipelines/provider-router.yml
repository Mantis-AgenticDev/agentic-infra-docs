# 05-CONFIGURATIONS/pipelines/provider-router.yml
# ==============================================================================
# SDD Hardened Provider Router Configuration
# ==============================================================================
# Descripción: Configuración maestra para el enrutamiento dinámico de inferencia 
# de IA. Permite alternar entre proveedores (OpenRouter, DashScope, DeepSeek API)
# y modelos (Qwen, DeepSeek, MiniMax) sin modificar el código fuente de la aplicación.
#
# Objetivo: Cumplir C6 (Inferencia Cloud Proxy) y garantizar resiliencia ante 
# caídas de proveedores o agotamiento de cuotas, priorizando modelos no occidentales.
#
# Uso: Este archivo es leído por el middleware `provider-router.ts` o scripts 
# de despliegue para configurar variables de entorno y healthchecks.
#
# Reglas Aplicadas: C1, C2, C3, C4, C6, C7, C8
# ==============================================================================

version: "1.0.0"
metadata:
  name: "provider-router-config"
  description: "Dynamic routing for Non-Western LLMs via Proxy/Direct APIs"
  constraints_applied: ["C1", "C2", "C3", "C4", "C6", "C7", "C8"]
  last_updated: "2025-06-10T12:00:00Z"

# ==============================================================================
# 1. GLOBAL DEFAULTS (C1/C2: Límites Operativos)
# ==============================================================================
global_defaults:
  # Timeout máximo para una llamada a la API de inferencia (ms)
  timeout_ms: 30000
  
  # Número máximo de reintentos antes de declarar fallo crítico
  max_retries: 3
  
  # Backoff exponencial base (ms) para reintentos
  retry_backoff_base_ms: 1000
  
  # Límite de tokens de salida por defecto (para control de costes C1)
  max_output_tokens: 4096
  
  # Temperatura por defecto (baja para código/tareas deterministas)
  temperature: 0.2
  
  # Top-P por defecto
  top_p: 0.9

# ==============================================================================
# 2. PROVIDER CONFIGURATIONS (C3: Credenciales vía Env Vars)
# ==============================================================================
providers:
  
  # --- OpenRouter (Proxy Agregador - Recomendado para Inicio) ---
  openrouter:
    enabled: true
    type: "proxy"
    base_url: "https://openrouter.ai/api/v1"
    auth_header: "Authorization"
    auth_scheme: "Bearer ${OPENROUTER_API_KEY}"
    headers_extra:
      HTTP-Referer: "https://mantis-agentic.dev"
      X-Title: "Mantis Agentic SDD Hardened"
    
    # Modelos soportados vía OpenRouter
    models:
      - id: "qwen/qwen-2.5-72b-instruct"
        alias: "qwen-main"
        priority: 1
        context_window: 131072
        cost_per_1k_input: 0.00035
        cost_per_1k_output: 0.00035
        capabilities: ["chat", "code", "rag", "json_mode"]
        
      - id: "deepseek/deepseek-chat"
        alias: "deepseek-main"
        priority: 2
        context_window: 128000
        cost_per_1k_input: 0.00014
        cost_per_1k_output: 0.00028
        capabilities: ["chat", "code", "reasoning"]
        
      - id: "minimax/minimax-01"
        alias: "minimax-main"
        priority: 3
        context_window: 4096000
        cost_per_1k_input: 0.0002
        cost_per_1k_output: 0.0011
        capabilities: ["chat", "long_context"]

  # --- Alibaba DashScope (Directo - Qwen Nativo) ---
  dashscope:
    enabled: false # Habilitar si se requiere conexión directa a Alibaba Cloud
    type: "direct"
    base_url: "https://dashscope-intl.aliyuncs.com/compatible-mode/v1"
    auth_header: "Authorization"
    auth_scheme: "Bearer ${DASHSCOPE_API_KEY}"
    
    models:
      - id: "qwen-max"
        alias: "qwen-max-direct"
        priority: 1
        context_window: 32768
        capabilities: ["chat", "complex_reasoning"]
        
      - id: "qwen-plus"
        alias: "qwen-plus-direct"
        priority: 2
        context_window: 131072
        capabilities: ["chat", "rag"]

  # --- DeepSeek API (Directo) ---
  deepseek_api:
    enabled: false # Habilitar si se requiere conexión directa a DeepSeek
    type: "direct"
    base_url: "https://api.deepseek.com/v1"
    auth_header: "Authorization"
    auth_scheme: "Bearer ${DEEPSEEK_API_KEY}"
    
    models:
      - id: "deepseek-chat"
        alias: "deepseek-chat-direct"
        priority: 1
        context_window: 128000
        capabilities: ["chat", "code"]
        
      - id: "deepseek-coder"
        alias: "deepseek-coder-direct"
        priority: 2
        context_window: 128000
        capabilities: ["code_generation", "debugging"]

# ==============================================================================
# 3. ROUTING STRATEGIES (C7: Resiliencia y Coste)
# ==============================================================================
routing_strategies:
  
  # Estrategia por Defecto: Prioridad Estática
  static_priority:
    description: "Usa el modelo con mayor prioridad disponible. Si falla, pasa al siguiente."
    fallback_chain:
      - "qwen-main"       # Intenta Qwen vía OpenRouter primero
      - "deepseek-main"   # Fallback a DeepSeek vía OpenRouter
      - "qwen-max-direct" # Fallback a Qwen Directo (si habilitado)
      - "deepseek-chat-direct" # Fallback a DeepSeek Directo (si habilitado)

  # Estrategia de Menor Coste
  cost_optimized:
    description: "Selecciona el modelo más barato que cumpla con los requisitos de contexto."
    rules:
      - if_context_less_than: 32000
        prefer_model: "deepseek-main" # DeepSeek suele ser muy económico
      - if_context_greater_than: 32000
        prefer_model: "qwen-main"     # Qwen maneja mejor contextos largos económicos
      
  # Estrategia de Máximo Rendimiento (Quality First)
  quality_first:
    description: "Prioriza capacidades de razonamiento y coding sobre coste."
    preferred_model: "qwen-main" # Qwen-2.5-72B es SOTA en muchos benchmarks open
    fallback_on_error: "deepseek-main"

# ==============================================================================
# 4. HEALTH CHECKS & CIRCUIT BREAKERS (C8: Observabilidad)
# ==============================================================================
health_monitoring:
  
  # Intervalo de chequeo de estado de proveedores (segundos)
  check_interval_seconds: 60
  
  # Umbrales para marcar un proveedor como "Degraded" o "Down"
  thresholds:
    error_rate_percent: 10   # Si >10% de requests fallan en 5 min
    latency_p95_ms: 5000     # Si p95 latency > 5s
    
  # Endpoints de Health Check (simulados o reales)
  endpoints:
    openrouter_status: "https://status.openrouter.ai"
    dashscope_status: "https://status.aliyun.com"
    deepseek_status: "https://status.deepseek.com"

  # Acciones ante Fallo (Circuit Breaker)
  circuit_breaker:
    open_after_failures: 5
    reset_timeout_seconds: 300
    action_on_open: "switch_to_next_provider_in_chain"

# ==============================================================================
# 5. TENANT-SPECIFIC OVERRIDES (C4: Multi-Tenancy)
# ==============================================================================
# Permite definir configuraciones específicas por tenant_id.
# Útil para clientes Enterprise que requieren modelos dedicados o regiones específicas.
tenant_overrides:
  
  # Ejemplo: Tenant Premium con acceso a modelos de mayor capacidad
  "enterprise-client-01":
    strategy: "quality_first"
    allowed_models:
      - "qwen-main"
      - "minimax-main"
    max_output_tokens: 8192
    timeout_ms: 45000
    
  # Ejemplo: Tenant Standard con restricción de costes
  "standard-client-02":
    strategy: "cost_optimized"
    allowed_models:
      - "deepseek-main"
      - "qwen-main"
    max_output_tokens: 2048
    timeout_ms: 20000

# ==============================================================================
# 6. LOGGING & AUDITING (C8: Trazabilidad)
# ==============================================================================
logging_config:
  
  # Nivel de log para eventos de routing
  level: "INFO" # DEBUG, INFO, WARN, ERROR
  
  # Eventos a registrar
  events_to_log:
    - "provider_selected"
    - "fallback_triggered"
    - "circuit_breaker_opened"
    - "cost_calculated"
    - "latency_threshold_exceeded"
    
  # Formato de Log JSON Estructurado
  json_structure:
    timestamp: "ISO8601"
    tenant_id: "string"
    event_type: "string"
    provider_used: "string"
    model_used: "string"
    latency_ms: "number"
    cost_usd: "number"
    success: "boolean"
    error_message: "string (optional)"

# ==============================================================================
# 7. EXAMPLE USAGE SCENARIOS (Didáctico)
# ==============================================================================
examples:
  
  - name: "Inicialización Básica (OpenRouter + Qwen)"
    description: "Configuración mínima para empezar a generar código con Qwen."
    config_snippet: |
      providers:
        openrouter:
          enabled: true
      routing_strategies:
        default: "static_priority"
    env_vars_required:
      - OPENROUTER_API_KEY

  - name: "Alta Disponibilidad (Fallback Chain)"
    description: "Si Qwen falla, usa DeepSeek. Si ambos fallan, usa MiniMax."
    config_snippet: |
      routing_strategies:
        static_priority:
          fallback_chain:
            - "qwen-main"
            - "deepseek-main"
            - "minimax-main"
    env_vars_required:
      - OPENROUTER_API_KEY

  - name: "Conexión Directa a DashScope (China Region)"
    description: "Para tenants que requieren baja latencia en Asia."
    config_snippet: |
      providers:
        dashscope:
          enabled: true
      routing_strategies:
        static_priority:
          fallback_chain:
            - "qwen-max-direct"
    env_vars_required:
      - DASHSCOPE_API_KEY

  - name: "Restricción de Costes Estricta"
    description: "Usar solo modelos baratos y limitar tokens."
    config_snippet: |
      global_defaults:
        max_output_tokens: 1024
      routing_strategies:
        default: "cost_optimized"
      tenant_overrides:
        "budget-client":
          strategy: "cost_optimized"
          allowed_models: ["deepseek-main"]

# ==============================================================================
# END OF FILE
