# 🐳 VPS1 — Docker Compose: n8n + uazapi + Redis + Traefik + OTEL

> Archivo de infraestructura de producción para VPS1 (KVM1 por defecto, override KVM2 disponible).
> Cubre servicios: n8n (orquestador), uazapi (WhatsApp), Redis (sesiones), Traefik (proxy), OTEL Collector (observabilidad).

---

## 📊 Distribución de Recursos

### KVM1 — Configuración Inicial (1 vCPU / 4 GB RAM)

```
VPS1 KVM1 — 4 GB RAM total
├── n8n            → 1.5 GB RAM  |  0.50 vCPU   ← orquestador principal
├── uazapi         → 0.75 GB RAM |  0.20 vCPU   ← WhatsApp interface
├── Redis          → 0.25 GB RAM |  0.10 vCPU   ← sesiones RAG
├── Traefik        → 0.12 GB RAM |  0.08 vCPU   ← reverse proxy + TLS
├── OTEL Collector → 0.12 GB RAM |  0.07 vCPU   ← observabilidad C8
└── OS / kernel    → 0.50 GB RAM |  0.05 vCPU   ← reservado
   TOTAL           → 3.24 GB     |  1.00 vCPU   ✅ dentro de C1/C2
```

### KVM2 — Override Scale-Up (2 vCPU / 8 GB RAM)

```
VPS1 KVM2 — 8 GB RAM total
├── n8n            → 3.00 GB RAM  |  1.00 vCPU
├── uazapi         → 1.50 GB RAM  |  0.40 vCPU
├── Redis          → 0.50 GB RAM  |  0.20 vCPU
├── Traefik        → 0.25 GB RAM  |  0.15 vCPU
├── OTEL Collector → 0.25 GB RAM  |  0.15 vCPU
└── OS / kernel    → 1.00 GB RAM  |  0.10 vCPU
   TOTAL           → 6.50 GB      |  2.00 vCPU  ✅ dentro de C1/C2
```

---

## 📁 Archivo Principal — KVM1 (Default)

```yaml
# ==============================================================================
# 05-CONFIGURATIONS/docker-compose/vps1-n8n-uazapi.yml
# VPS1: n8n + uazapi + Redis + Traefik + OTEL Collector
# Target: KVM1 (1 vCPU / 4 GB RAM / 50 GB NVMe)
# Constraints: C1(RAM), C2(CPU), C3(secrets), C4(tenant), C7(resiliencia), C8(logs)
# Versión: 1.0.0 | MANTIS AGENTIC — SDD Hardened
# ==============================================================================

x-logging-default: &logging-default
  # C8: Logs estructurados JSON con rotación automática
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"
    tag: "{{.Name}}/{{.ID}}"

x-restart-default: &restart-default
  # C7: Reinicio automático excepto en parada manual
  restart: unless-stopped

x-networks-default: &networks-default
  networks:
    - mantis-internal

x-healthcheck-base: &healthcheck-base
  # C7: Health checks en todos los servicios críticos
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 60s

services:

  # ─────────────────────────────────────────────────────────────────────────
  # TRAEFIK — Reverse Proxy + TLS Automático (Let's Encrypt)
  # C3: Sin puertos DB/Redis expuestos al exterior
  # C7: Circuit breaker + retry integrado en labels
  # ─────────────────────────────────────────────────────────────────────────
  traefik:
    image: traefik:v3.0
    container_name: mantis-traefik
    <<: *restart-default
    <<: *networks-default
    logging: *logging-default

    # C1/C2: Límites de recursos Traefik
    mem_limit: 128m
    mem_reservation: 64m
    cpus: "0.08"
    pids_limit: 100

    ports:
      - "80:80"             # HTTP → redirect a HTTPS
      - "443:443"           # HTTPS (Let's Encrypt)
      # C3: Panel admin NUNCA expuesto al exterior — solo localhost
      - "127.0.0.1:8080:8080"

    environment:
      # C3: Cero valores hardcodeados — fallar rápido si falta
      - TRAEFIK_LOG_LEVEL=${TRAEFIK_LOG_LEVEL:-warn}
      - TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_EMAIL=${ACME_EMAIL:?C3: ACME_EMAIL missing}

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/letsencrypt
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro

    command:
      - "--api.insecure=false"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=mantis-internal"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      # C7: Retry y circuit breaker
      - "--entrypoints.websecure.transport.respondingTimeouts.readTimeout=60s"
      - "--entrypoints.websecure.transport.respondingTimeouts.writeTimeout=60s"
      - "--entrypoints.websecure.transport.respondingTimeouts.idleTimeout=180s"
      # C8: Access logs estructurados
      - "--accesslog=true"
      - "--accesslog.format=json"
      - "--log.format=json"
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.addServicesLabels=true"

    labels:
      - "traefik.enable=true"
      # Dashboard protegido con BasicAuth
      - "traefik.http.routers.traefik-dash.rule=Host(`traefik.${DOMAIN:?C3: DOMAIN missing}`)"
      - "traefik.http.routers.traefik-dash.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-dash.middlewares=traefik-auth"
      - "traefik.http.middlewares.traefik-auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH:?C3: TRAEFIK_DASHBOARD_AUTH missing}"

    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      <<: *healthcheck-base

  # ─────────────────────────────────────────────────────────────────────────
  # N8N — Orquestador de Agentes
  # C1: mem_limit 1536m (máximo permitido en KVM1)
  # C2: cpus 0.50 (50% del único núcleo disponible)
  # C4: TENANT_ID inyectado, propagado a todos los workflows
  # C7: Concurrencia limitada, timeout de webhook explícito
  # ─────────────────────────────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: mantis-n8n
    <<: *restart-default
    <<: *networks-default
    logging: *logging-default

    # C1: Límite estricto de RAM — OOM killer limpio en vez de swap lento
    mem_limit: 1536m
    mem_reservation: 768m
    memswap_limit: 1536m   # Sin swap — fallo limpio en OOM

    # C2: CPU limitado a 50% del núcleo físico
    cpus: "0.50"
    cpu_shares: 512

    # C7: Límite de procesos hijo
    pids_limit: 150

    depends_on:
      redis:
        condition: service_healthy
      traefik:
        condition: service_healthy

    environment:
      # ── Identidad y seguridad ──────────────────────────────────────────
      # C3: Credenciales desde env — falla si no están definidas
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:?C3: N8N_BASIC_AUTH_USER missing}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:?C3: N8N_BASIC_AUTH_PASSWORD missing}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?C3: N8N_ENCRYPTION_KEY missing}
      N8N_USER_MANAGEMENT_JWT_SECRET: ${N8N_JWT_SECRET:?C3: N8N_JWT_SECRET missing}

      # ── URL y acceso ───────────────────────────────────────────────────
      N8N_HOST: ${DOMAIN:?C3: DOMAIN missing}
      N8N_PORT: "5678"
      N8N_PROTOCOL: "https"
      WEBHOOK_URL: "https://${DOMAIN}/webhook"
      N8N_EDITOR_BASE_URL: "https://${DOMAIN}"

      # ── Base de datos n8n (SQLite en KVM1, migrar a Postgres en KVM2) ──
      DB_TYPE: "sqlite"
      DB_SQLITE_VACUUM_ON_STARTUP: "true"

      # ── C4: Tenant awareness ───────────────────────────────────────────
      TENANT_ID: ${TENANT_ID:?C4: TENANT_ID missing}

      # ── C1/C2: Límites de ejecución (RES-009) ─────────────────────────
      EXECUTIONS_PROCESS: "main"
      EXECUTIONS_MAX_CONCURRENT: "5"
      EXECUTIONS_DATA_MAX_AGE: "336"         # 14 días de historial
      EXECUTIONS_DATA_PRUNE: "true"
      WEBHOOK_TIMEOUT: "30000"               # C2: 30s timeout máximo

      # ── Memoria JVM-like para Node.js ──────────────────────────────────
      NODE_OPTIONS: "--max-old-space-size=1400"  # 1.4GB — margen bajo mem_limit

      # ── Redis para sesiones y queue ────────────────────────────────────
      QUEUE_BULL_REDIS_HOST: "redis"
      QUEUE_BULL_REDIS_PORT: "6379"
      QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD:?C3: REDIS_PASSWORD missing}
      QUEUE_BULL_REDIS_TIMEOUT_THRESHOLD: "10000"

      # ── OpenRouter / AI (C6: cloud-only) ──────────────────────────────
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?C3: OPENROUTER_API_KEY missing}

      # ── C8: Logs estructurados ─────────────────────────────────────────
      N8N_LOG_LEVEL: ${N8N_LOG_LEVEL:-warn}
      N8N_LOG_OUTPUT: "console"
      N8N_METRICS: "true"
      N8N_METRICS_PREFIX: "mantis_n8n_"

      # ── Seguridad adicional ────────────────────────────────────────────
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "true"
      N8N_DISABLE_PRODUCTION_MAIN_PROCESS: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
      N8N_TEMPLATES_ENABLED: "false"         # Reducir superficie de ataque
      N8N_PERSONALIZATION_ENABLED: "false"
      GENERIC_TIMEZONE: "America/Sao_Paulo"

    volumes:
      - n8n-data:/home/node/.n8n
      - /etc/localtime:/etc/localtime:ro

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.n8n.tls.certresolver=letsencrypt"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"
      # C7: Rate limiting via Traefik middleware
      - "traefik.http.routers.n8n.middlewares=n8n-ratelimit,n8n-headers"
      - "traefik.http.middlewares.n8n-ratelimit.ratelimit.average=100"
      - "traefik.http.middlewares.n8n-ratelimit.ratelimit.burst=50"
      - "traefik.http.middlewares.n8n-ratelimit.ratelimit.period=1m"
      # C3: Security headers
      - "traefik.http.middlewares.n8n-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.n8n-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.n8n-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.n8n-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.n8n-headers.headers.referrerPolicy=same-origin"
      # C4: Header tenant propagado
      - "mantis.tenant=${TENANT_ID}"
      - "mantis.service=n8n"

    healthcheck:
      test:
        - "CMD-SHELL"
        - "wget -q --spider http://localhost:5678/healthz || exit 1"
      <<: *healthcheck-base

  # ─────────────────────────────────────────────────────────────────────────
  # UAZAPI — WhatsApp Business Gateway
  # C1: mem_limit 768m
  # C2: cpus 0.20
  # C3: API token desde env
  # C7: Auto-reconexión de sesión WhatsApp
  # ─────────────────────────────────────────────────────────────────────────
  uazapi:
    image: uazapi/uazapi:latest
    container_name: mantis-uazapi
    <<: *restart-default
    <<: *networks-default
    logging: *logging-default

    # C1/C2: Límites estrictos
    mem_limit: 768m
    mem_reservation: 384m
    memswap_limit: 768m
    cpus: "0.20"
    pids_limit: 100

    depends_on:
      redis:
        condition: service_healthy
      traefik:
        condition: service_healthy

    environment:
      # C3: Credenciales desde env
      UAZAPI_TOKEN: ${UAZAPI_TOKEN:?C3: UAZAPI_TOKEN missing}
      UAZAPI_MONGO_DB: ${UAZAPI_MONGO_DB:-uazapi}

      # C4: Tenant inyectado en logs y headers de webhook
      TENANT_ID: ${TENANT_ID:?C4: TENANT_ID missing}

      # Webhook destino: n8n (red interna — C3)
      UAZAPI_WEBHOOK_URL: "http://n8n:5678/webhook/whatsapp"
      UAZAPI_WEBHOOK_SECRET: ${UAZAPI_WEBHOOK_SECRET:?C3: UAZAPI_WEBHOOK_SECRET missing}

      # Redis para persistencia de sesión
      UAZAPI_REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/1"

      # C1: Timeout de operaciones
      UAZAPI_TIMEOUT: "30000"

      # C8: Logs JSON
      LOG_LEVEL: ${LOG_LEVEL:-warn}
      LOG_FORMAT: "json"
      NODE_OPTIONS: "--max-old-space-size=700"

    volumes:
      - uazapi-sessions:/app/sessions
      - uazapi-media:/app/media

    labels:
      - "traefik.enable=true"
      # uazapi NO debe tener acceso público directo
      # Solo n8n puede llamarlo internamente vía red Docker
      - "traefik.enable=false"
      - "mantis.tenant=${TENANT_ID}"
      - "mantis.service=uazapi"

    healthcheck:
      test:
        - "CMD-SHELL"
        - "wget -q --spider http://localhost:3333/health || exit 1"
      <<: *healthcheck-base

  # ─────────────────────────────────────────────────────────────────────────
  # REDIS — Session Store y Cache de Agentes
  # C1: maxmemory 220mb (dentro de mem_limit 256m)
  # C4: Claves prefijadas con tenant_id (enforced en aplicación)
  # C7: volatile-lru — elimina solo keys con TTL cuando hay presión de RAM
  # ─────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mantis-redis
    <<: *restart-default
    <<: *networks-default
    logging: *logging-default

    # C1/C2: Límites más conservadores para Redis
    mem_limit: 256m
    mem_reservation: 128m
    memswap_limit: 256m
    cpus: "0.10"
    pids_limit: 50

    # C3: Password desde env, puerto solo en red interna
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?C3: REDIS_PASSWORD missing}
      --maxmemory 220mb
      --maxmemory-policy volatile-lru
      --save ""
      --appendonly no
      --loglevel warning
      --protected-mode yes
      --bind 0.0.0.0
      --timeout 300
      --tcp-keepalive 60
      --databases 4
    # DB 0: n8n queue/bull
    # DB 1: uazapi sesiones
    # DB 2: RAG response cache
    # DB 3: rate limiting

    ports:
      # C3: NUNCA exponer Redis al exterior — solo red Docker interna
      - "127.0.0.1:6379:6379"

    volumes:
      - redis-data:/data

    healthcheck:
      test:
        - "CMD"
        - "redis-cli"
        - "-a"
        - "${REDIS_PASSWORD}"
        - "ping"
      <<: *healthcheck-base
      start_period: 15s

  # ─────────────────────────────────────────────────────────────────────────
  # OTEL COLLECTOR — Observabilidad C8
  # Recibe trazas, métricas y logs estructurados de todos los servicios
  # Exporta a backends configurados vía env vars
  # ─────────────────────────────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: mantis-otel
    <<: *restart-default
    <<: *networks-default
    logging: *logging-default

    # C1/C2: Colector es liviano por diseño
    mem_limit: 128m
    mem_reservation: 64m
    cpus: "0.07"
    pids_limit: 50

    environment:
      # C3: Endpoints de exportación desde env
      OTEL_TRACES_ENDPOINT: ${OTEL_TRACES_ENDPOINT:-}
      OTEL_METRICS_ENDPOINT: ${OTEL_METRICS_ENDPOINT:-}
      OTEL_LOGS_ENDPOINT: ${OTEL_LOGS_ENDPOINT:-}
      OTEL_AUTH_TOKEN: ${OTEL_AUTH_TOKEN:-}
      # C4: Tenant como atributo de recurso global
      TENANT_ID: ${TENANT_ID:?C4: TENANT_ID missing}
      ENVIRONMENT: ${ENVIRONMENT:-production}

    volumes:
      - ./otel-collector-config.yml:/etc/otelcol-contrib/config.yaml:ro
      - /var/log:/var/log/host:ro

    ports:
      # Solo en red interna (C3)
      - "127.0.0.1:4317:4317"   # OTLP gRPC
      - "127.0.0.1:4318:4318"   # OTLP HTTP
      - "127.0.0.1:8888:8888"   # Métricas del propio collector

    healthcheck:
      test:
        - "CMD"
        - "wget"
        - "-q"
        - "--spider"
        - "http://localhost:13133/healthz"
      <<: *healthcheck-base

# ─────────────────────────────────────────────────────────────────────────────
# REDES — Aislamiento por Diseño
# ─────────────────────────────────────────────────────────────────────────────
networks:
  mantis-internal:
    driver: bridge
    name: mantis-internal-${TENANT_ID:-default}
    driver_opts:
      # C3: ICC deshabilitado — los contenedores solo se comunican
      #     a través de los links declarados explícitamente
      com.docker.network.bridge.enable_icc: "false"
      com.docker.network.bridge.enable_ip_masquerade: "true"
    ipam:
      driver: default
      config:
        - subnet: "172.20.0.0/24"

# ─────────────────────────────────────────────────────────────────────────────
# VOLÚMENES — Persistencia con labels de tenant (C4)
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  n8n-data:
    name: "mantis-n8n-data-${TENANT_ID:-default}"
    labels:
      mantis.tenant: "${TENANT_ID:-default}"
      mantis.service: "n8n"
      mantis.backup: "daily"     # C5: marcado para backup automático
  uazapi-sessions:
    name: "mantis-uazapi-sessions-${TENANT_ID:-default}"
    labels:
      mantis.tenant: "${TENANT_ID:-default}"
      mantis.service: "uazapi"
      mantis.backup: "daily"
  uazapi-media:
    name: "mantis-uazapi-media-${TENANT_ID:-default}"
    labels:
      mantis.tenant: "${TENANT_ID:-default}"
      mantis.service: "uazapi"
      mantis.backup: "weekly"
  redis-data:
    name: "mantis-redis-data-${TENANT_ID:-default}"
    labels:
      mantis.tenant: "${TENANT_ID:-default}"
      mantis.service: "redis"
      mantis.backup: "none"      # Redis es volátil — sesiones se pueden perder
  traefik-certs:
    name: "mantis-traefik-certs"
    labels:
      mantis.service: "traefik"
      mantis.backup: "daily"     # C5: certificados TLS deben respaldarse
```

