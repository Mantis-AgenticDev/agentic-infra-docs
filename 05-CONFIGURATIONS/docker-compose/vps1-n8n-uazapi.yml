## ✅ Tabla de Validación (C5)

| # | Check | Constraint | Comando | ✅ Deberías ver | ❌ Si ves esto | Solución |
|---|---|---|---|---|---|---|
| 1 | Límites C1/C2 declarados | C1/C2 | `grep -cE 'mem_limit\|cpus\|pids_limit' vps1-n8n-uazapi.yml` | `>= 15` | `< 15` | Agregar `mem_limit` y `cpus` a todos los servicios |
| 2 | Sin credenciales hardcodeadas | C3 | `./05-CONFIGURATIONS/validation/audit-secrets.sh .` | `status: passed` | `CRITICAL: hardcoded secret` | Mover valores a `.env` con `${VAR:?missing}` |
| 3 | tenant_id en compose | C4 | `grep -c 'TENANT_ID' vps1-n8n-uazapi.yml` | `>= 6` | `0` | Agregar `TENANT_ID: ${TENANT_ID:?C4}` a cada servicio |
| 4 | Healthchecks en todos los servicios | C7 | `grep -c 'healthcheck' vps1-n8n-uazapi.yml` | `>= 5` | `< 5` | Agregar bloque `healthcheck:` al servicio faltante |
| 5 | Logs JSON configurados | C8 | `grep -c 'json-file' vps1-n8n-uazapi.yml` | `>= 4` | `0` | Agregar `logging: *logging-default` a cada servicio |
| 6 | Redis solo en localhost | C3 | `grep 'redis' vps1-n8n-uazapi.yml \| grep ports` | `127.0.0.1:6379` | `0.0.0.0:6379` | Cambiar binding a `127.0.0.1:6379:6379` |
| 7 | ICC deshabilitado en red | C3 | `grep 'enable_icc' vps1-n8n-uazapi.yml` | `"false"` | `"true"` o ausente | Agregar `com.docker.network.bridge.enable_icc: "false"` |
| 8 | uazapi sin exposición pública | C3 | `grep -A3 'uazapi:' vps1-n8n-uazapi.yml \| grep 'traefik.enable'` | `"false"` | `"true"` | uazapi solo debe ser accesible desde n8n internamente |
| 9 | memswap_limit = mem_limit | C1 | `grep 'memswap_limit' vps1-n8n-uazapi.yml` | Mismo valor que `mem_limit` | `memswap_limit: -1` | Configurar `memswap_limit` igual a `mem_limit` para evitar swap |
| 10 | docker compose validate | C1-C8 | `docker compose -f vps1-n8n-uazapi.yml config --quiet` | Sin output (éxito silencioso) | `Error: ...` | Corregir la sintaxis YAML indicada en el error |
| 11 | n8n RAM < 1536m en KVM1 | C1 | `grep 'n8n' -A5 vps1-n8n-uazapi.yml \| grep mem_limit` | `1536m` | `> 1536m` | Reducir `mem_limit` o usar KVM2 override |
| 12 | Volúmenes con label tenant | C4 | `grep -c 'mantis.tenant' vps1-n8n-uazapi.yml` | `>= 4` | `0` | Agregar `labels: mantis.tenant: "${TENANT_ID}"` a cada volumen |
| 13 | TLS en Traefik activo | C3 | `grep 'tls.certresolver=letsencrypt' vps1-n8n-uazapi.yml` | Match encontrado | No match | Agregar `tls.certresolver=letsencrypt` en labels del router |
| 14 | OTEL recibe en localhost | C3 | `grep '4317\|4318' vps1-n8n-uazapi.yml` | `127.0.0.1:4317` | `0.0.0.0:4317` | Restringir binding OTEL a localhost |
| 15 | Override KVM2 no rompe KVM1 | C7 | `docker compose -f base.yml -f kvm2.override.yml config --quiet` | Sin output | `Error: conflicting` | Verificar que override solo sobreescribe recursos, no estructura |

