## 🚀 Scripts de Deploy

### Setup Inicial (ejecutar una vez por VPS)

```bash
#!/bin/bash
# scripts/vps1-initial-setup.sh
# Ejecutar como root en VPS1 virgen
# C5: Verificar integridad antes de continuar

set -euo pipefail

TENANT_ID="${1:?C4: tenant_id requerido como primer argumento}"
DOMAIN="${2:?C3: dominio requerido como segundo argumento}"

echo "🚀 Setup VPS1 para tenant: $TENANT_ID | dominio: $DOMAIN"

# ── 1. Actualizar sistema ──────────────────────────────────────────────────
apt-get update -y && apt-get upgrade -y

# ── 2. Instalar dependencias ───────────────────────────────────────────────
apt-get install -y docker.io docker-compose-plugin ufw fail2ban \
  htop curl wget jq openssl apache2-utils

systemctl enable docker && systemctl start docker

# ── 3. Hardening básico ────────────────────────────────────────────────────
# UFW — ver ufw-firewall-configuration.md
ufw default deny incoming
ufw default allow outgoing
ufw allow ssh
ufw allow 80/tcp
ufw allow 443/tcp
ufw --force enable

# ── 4. Crear directorio de proyecto ──────────────────────────────────────
mkdir -p /opt/mantis/{docker-compose,volumes,backups,logs}
cd /opt/mantis

# ── 5. Copiar archivos ─────────────────────────────────────────────────────
# [El humano copia aquí el contenido del ZIP generado]

# ── 6. Configurar .env ────────────────────────────────────────────────────
echo "⚠️  ACCIÓN MANUAL REQUERIDA:"
echo "   1. Editar /opt/mantis/.env con valores reales"
echo "   2. Ejecutar: ./validate-env.sh"
echo "   3. Ejecutar: ./deploy.sh $TENANT_ID"

echo "✅ Setup inicial completo. Ahora configura el .env."
```

### Deploy + Validación

```bash
#!/bin/bash
# scripts/vps1-deploy.sh
# C5: Validar antes de deployar — nunca skip
# C7: Rollback automático si health checks fallan

set -euo pipefail

TENANT_ID="${1:?C4: tenant_id requerido}"
COMPOSE_FILE="05-CONFIGURATIONS/docker-compose/vps1-n8n-uazapi.yml"
OVERRIDE_FILE="05-CONFIGURATIONS/docker-compose/vps1-n8n-uazapi.kvm2.override.yml"
KVM_TYPE="${2:-kvm1}"   # kvm1 (default) | kvm2

echo "🐳 Deploy VPS1 | tenant: $TENANT_ID | server: $KVM_TYPE"

# ── PRE-DEPLOY: Validaciones C1-C8 ────────────────────────────────────────

echo "  Verificando constraints C1/C2 (límites de recursos)..."
LIMITS_COUNT=$(grep -cE 'mem_limit|cpus|pids_limit' "$COMPOSE_FILE" || true)
if [[ "$LIMITS_COUNT" -lt 15 ]]; then
  echo "❌ C1/C2: Solo $LIMITS_COUNT límites definidos (mínimo 15)"
  exit 1
fi
echo "  ✅ C1/C2: $LIMITS_COUNT límites de recursos encontrados"

echo "  Verificando C3 (sin secrets hardcodeados)..."
./05-CONFIGURATIONS/validation/audit-secrets.sh "$COMPOSE_FILE" /dev/null 1 1
echo "  ✅ C3: Sin credenciales hardcodeadas"

echo "  Verificando C4 (tenant_id presente)..."
if ! grep -q "TENANT_ID" "$COMPOSE_FILE"; then
  echo "❌ C4: TENANT_ID no encontrado en compose file"
  exit 1
fi
echo "  ✅ C4: TENANT_ID referenciado"

echo "  Verificando .env cargado..."
if [[ -z "${TENANT_ID:-}" ]]; then
  echo "❌ C4: TENANT_ID no exportado en entorno"
  exit 1
fi
echo "  ✅ Variables de entorno verificadas"

# ── SNAPSHOT PRE-DEPLOY (C5) ───────────────────────────────────────────────
TIMESTAMP=$(date +%Y%m%d_%H%M%S)
CONFIG_HASH=$(sha256sum "$COMPOSE_FILE" | awk '{print $1}')
echo "  📸 Snapshot: $TIMESTAMP | SHA256: ${CONFIG_HASH:0:16}..."

# ── DEPLOY ────────────────────────────────────────────────────────────────
if [[ "$KVM_TYPE" == "kvm2" ]]; then
  docker compose \
    -f "$COMPOSE_FILE" \
    -f "$OVERRIDE_FILE" \
    --env-file .env \
    up -d --remove-orphans --wait
else
  docker compose \
    -f "$COMPOSE_FILE" \
    --env-file .env \
    up -d --remove-orphans --wait
fi

# ── POST-DEPLOY: Health Checks ─────────────────────────────────────────────
echo "  ⏳ Esperando health checks (60s)..."
sleep 60

UNHEALTHY=$(docker ps --filter "health=unhealthy" --filter "label=mantis.tenant=$TENANT_ID" -q)
if [[ -n "$UNHEALTHY" ]]; then
  echo "❌ Servicios no saludables detectados — iniciando rollback"
  docker compose -f "$COMPOSE_FILE" down
  echo "❌ Deploy fallido. Revisar logs: docker compose logs"
  exit 1
fi

echo "✅ Deploy exitoso para tenant: $TENANT_ID"
echo "   n8n:    https://${DOMAIN}"
echo "   Traefik: https://traefik.${DOMAIN}"

# C5: Log final de auditoría
echo "{\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"tenant_id\":\"$TENANT_ID\",\"event\":\"deploy_success\",\"sha256\":\"$CONFIG_HASH\",\"server\":\"$KVM_TYPE\"}"
```

