## 🔍 Comandos de Verificación Post-Deploy

```bash
# 1. Estado de todos los servicios
docker compose -f vps1-n8n-uazapi.yml ps

# 2. Uso de recursos en tiempo real (C1/C2)
docker stats --no-stream --format \
  "table {{.Name}}\t{{.MemUsage}}\t{{.CPUPerc}}\t{{.PIDs}}"

# 3. Verificar que n8n responde
curl -sf https://${DOMAIN}/healthz | jq .

# 4. Verificar que Redis es accesible solo desde la red interna
docker exec mantis-n8n redis-cli -h redis -a "${REDIS_PASSWORD}" ping
# ✅ Deberías ver: PONG

# 5. Verificar que Redis NO es accesible desde fuera del VPS
# (ejecutar desde tu máquina local, NO desde el VPS)
redis-cli -h IP_DEL_VPS -p 6379 ping 2>&1
# ✅ Deberías ver: Connection refused

# 6. Verificar logs estructurados JSON (C8)
docker logs mantis-n8n --tail 10 | python3 -m json.tool

# 7. Verificar tenant_id en logs
docker logs mantis-n8n 2>&1 | grep -o '"tenant_id":"[^"]*"' | head -5

# 8. Verificar consumo de disco (C1)
docker system df
df -h /opt/mantis

# 9. Health check de todos los contenedores
docker inspect --format='{{.Name}}: {{.State.Health.Status}}' \
  mantis-n8n mantis-uazapi mantis-redis mantis-traefik mantis-otel

# 10. Validar compose contra schema SDD
./05-CONFIGURATIONS/validation/validate-skill-integrity.sh \
  05-CONFIGURATIONS/docker-compose/ master-report.json 1 1
```

