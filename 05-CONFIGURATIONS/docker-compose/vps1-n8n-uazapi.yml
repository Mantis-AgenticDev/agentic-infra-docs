## 📁 Override KVM2 — Scale-Up (2 vCPU / 8 GB RAM)

Aplicar sobre el base: `docker compose -f vps1-n8n-uazapi.yml -f vps1-n8n-uazapi.kvm2.override.yml up -d`

```yaml
# 05-CONFIGURATIONS/docker-compose/vps1-n8n-uazapi.kvm2.override.yml
# Override para KVM2: 2 vCPU / 8 GB RAM
# Uso: docker compose -f vps1-n8n-uazapi.yml -f vps1-n8n-uazapi.kvm2.override.yml up -d

services:
  n8n:
    # C1/C2: Escalar a KVM2
    mem_limit: 3072m
    mem_reservation: 1536m
    memswap_limit: 3072m
    cpus: "1.00"
    environment:
      EXECUTIONS_MAX_CONCURRENT: "10"          # El doble de KVM1
      NODE_OPTIONS: "--max-old-space-size=2800"
      DB_TYPE: "postgresdb"                    # KVM2: migrar a Postgres
      DB_POSTGRESDB_HOST: ${DB_HOST:?missing}
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: ${DB_NAME:?missing}
      DB_POSTGRESDB_USER: ${DB_USER:?missing}
      DB_POSTGRESDB_PASSWORD: ${DB_PASSWORD:?missing}
      DB_POSTGRESDB_SCHEMA: "public"
      DB_POSTGRESDB_SSL_ENABLED: "true"

  uazapi:
    mem_limit: 1536m
    mem_reservation: 768m
    memswap_limit: 1536m
    cpus: "0.40"
    environment:
      NODE_OPTIONS: "--max-old-space-size=1400"

  redis:
    mem_limit: 512m
    mem_reservation: 256m
    cpus: "0.20"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 460mb
      --maxmemory-policy volatile-lru
      --save ""
      --appendonly no
      --loglevel warning

  otel-collector:
    mem_limit: 256m
    mem_reservation: 128m
    cpus: "0.15"

  traefik:
    mem_limit: 256m
    mem_reservation: 128m
    cpus: "0.15"
```

