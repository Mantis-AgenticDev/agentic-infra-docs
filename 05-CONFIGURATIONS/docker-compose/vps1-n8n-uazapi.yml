## 🔑 Variables de Entorno — Template

```bash
# 05-CONFIGURATIONS/environment/.env.vps1.example
# ==============================================================================
# MANTIS AGENTIC — VPS1 Environment Variables
# NUNCA commitear con valores reales. Usar como base para .env
# Generar con: cp .env.vps1.example .env.vps1 && nano .env.vps1
# ==============================================================================

# ── C4: Identidad del tenant ────────────────────────────────────────────────
TENANT_ID=restaurante_001                      # kebab-case, sin espacios

# ── C3: Dominio y TLS ───────────────────────────────────────────────────────
DOMAIN=n8n.tudominio.com.br
ACME_EMAIL=admin@tudominio.com.br

# ── C3: Credenciales n8n ────────────────────────────────────────────────────
N8N_BASIC_AUTH_USER=admin
N8N_BASIC_AUTH_PASSWORD=CAMBIAR_POR_CONTRASEÑA_FUERTE_32_CHARS
N8N_ENCRYPTION_KEY=GENERAR_CON_openssl_rand_-hex_32
N8N_JWT_SECRET=GENERAR_CON_openssl_rand_-hex_32

# ── C3: Credenciales uazapi ─────────────────────────────────────────────────
UAZAPI_TOKEN=CAMBIAR_POR_TOKEN_FUERTE
UAZAPI_WEBHOOK_SECRET=GENERAR_CON_openssl_rand_-hex_24

# ── C3: Redis ───────────────────────────────────────────────────────────────
